name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gradle:
    name: Gradle build and tests
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test Windows libmpv bundle verifier
        shell: pwsh
        run: .\tools\windows\test-verify-libmpv-bundle.ps1

      - name: Test libmpv dependency installer
        shell: pwsh
        run: .\tools\windows\test-install-libmpv-dependency.ps1

      - name: Install approved libmpv dependency
        shell: pwsh
        run: .\tools\windows\install-libmpv-dependency.ps1 -AcceptLicense

      - name: Decode Android CI signing key
        shell: pwsh
        env:
          DANMAKU_ANDROID_KEYSTORE_BASE64: ${{ secrets.DANMAKU_ANDROID_KEYSTORE_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:DANMAKU_ANDROID_KEYSTORE_BASE64)) {
            Write-Host "Android CI signing key is not configured; using the runner debug key."
            exit 0
          }
          [System.IO.File]::WriteAllBytes(
            "$env:RUNNER_TEMP\danmaku-android-ci.keystore",
            [Convert]::FromBase64String($env:DANMAKU_ANDROID_KEYSTORE_BASE64)
          )

      - name: Build and test JVM/Android targets
        shell: pwsh
        env:
          DANMAKU_ANDROID_KEYSTORE_PATH: ${{ runner.temp }}\danmaku-android-ci.keystore
          DANMAKU_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.DANMAKU_ANDROID_KEYSTORE_PASSWORD }}
          DANMAKU_ANDROID_KEY_ALIAS: ${{ secrets.DANMAKU_ANDROID_KEY_ALIAS }}
          DANMAKU_ANDROID_KEY_PASSWORD: ${{ secrets.DANMAKU_ANDROID_KEY_PASSWORD }}
        run: .\gradlew.bat --no-daemon :shared:domain:jvmTest :shared:library-client:jvmTest :shared:library-server-core:jvmTest :apps:desktop-windows:desktopTest :shared:library-client-android:testDebugUnitTest :shared:player-android-media3:assembleDebugAndroidTest :apps:android-mobile:assembleDebug :apps:android-tv:assembleDebug :apps:desktop-windows:createDistributable

      - name: Build Windows mpv bridge
        run: cargo build --release -p player-windows-mpv --lib

      - name: Prepare runtime-free Windows release with approved LGPL libmpv
        shell: pwsh
        run: .\tools\windows\prepare-windows-release.ps1

      - name: Verify packaged Windows mpv runtime
        shell: pwsh
        run: .\tools\windows\verify-windows-mpv-runtime.ps1

      - name: Upload Android Mobile APK
        uses: actions/upload-artifact@v7
        with:
          name: danmaku-android-mobile-debug
          path: apps/android-mobile/build/outputs/apk/debug/android-mobile-debug.apk
          if-no-files-found: error

      - name: Upload Android TV APK
        uses: actions/upload-artifact@v7
        with:
          name: danmaku-android-tv-debug
          path: apps/android-tv/build/outputs/apk/debug/android-tv-debug.apk
          if-no-files-found: error

      - name: Upload Windows Desktop Distributable
        uses: actions/upload-artifact@v7
        with:
          name: danmaku-windows-desktop
          path: apps/desktop-windows/build/release/windows-portable/
          if-no-files-found: error

  rust:
    name: Rust format and tests
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Test Rust workspace
        run: cargo test --workspace

  macos-desktop:
    name: macOS desktop build and tests
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test Rust workspace on macOS
        run: cargo test --workspace

      - name: Build and test macOS desktop target
        run: bash ./gradlew --no-daemon :apps:desktop-windows:desktopTest :apps:desktop-windows:createDistributable

      - name: Upload macOS Desktop App
        uses: actions/upload-artifact@v7
        with:
          name: danmaku-macos-desktop
          path: apps/desktop-windows/build/compose/binaries/main/app/desktop-windows.app/
          if-no-files-found: error
