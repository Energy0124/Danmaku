name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gradle:
    name: Gradle build and tests
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test Windows libmpv bundle verifier
        shell: pwsh
        run: .\tools\windows\test-verify-libmpv-bundle.ps1

      - name: Test libmpv dependency installer
        shell: pwsh
        run: .\tools\windows\test-install-libmpv-dependency.ps1

      - name: Install approved libmpv dependency
        shell: pwsh
        run: .\tools\windows\install-libmpv-dependency.ps1 -AcceptLicense

      - name: Build and test JVM/Android targets
        shell: pwsh
        run: .\gradlew.bat --no-daemon :shared:domain:jvmTest :shared:library-client:jvmTest :shared:library-server-core:jvmTest :apps:desktop-windows:desktopTest :shared:library-client-android:testDebugUnitTest :shared:player-android-media3:assembleDebugAndroidTest :apps:android-mobile:assembleDebug :apps:android-tv:assembleDebug :apps:desktop-windows:createDistributable

      - name: Build Windows mpv bridge
        run: cargo build --release -p player-windows-mpv --lib

      - name: Prepare runtime-free Windows release with approved LGPL libmpv
        shell: pwsh
        run: .\tools\windows\prepare-windows-release.ps1

      - name: Verify packaged Windows mpv runtime
        shell: pwsh
        run: .\tools\windows\verify-windows-mpv-runtime.ps1

      - name: Upload Android Mobile APK
        uses: actions/upload-artifact@v7
        with:
          name: danmaku-android-mobile-debug
          path: apps/android-mobile/build/outputs/apk/debug/android-mobile-debug.apk
          if-no-files-found: error

      - name: Upload Android TV APK
        uses: actions/upload-artifact@v7
        with:
          name: danmaku-android-tv-debug
          path: apps/android-tv/build/outputs/apk/debug/android-tv-debug.apk
          if-no-files-found: error

      - name: Upload Windows Desktop Distributable
        uses: actions/upload-artifact@v7
        with:
          name: danmaku-windows-desktop
          path: apps/desktop-windows/build/release/windows-portable/
          if-no-files-found: error

  rust:
    name: Rust format and tests
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Test Rust workspace
        run: cargo test --workspace
